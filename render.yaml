databases:
  - name: ftracker-db
    databaseName: finance_dashboard
    user: postgres
    plan: free

services:
  - type: web
    name: ftracker-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PROJECT_NAME
        value: "Finance Dashboard Backend"
      - key: DATABASE_URL
        fromDatabase:
          name: ftracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_HOST
        value: "https://ftracker-frontend.vercel.app" # Please update this after Vercel deployment
      - key: BACKEND_CORS_ORIGINS
        value: "https://ftracker-frontend.vercel.app" # Please update this after Vercel deployment
      - key: FIRST_SUPERUSER_EMAIL
        value: "admin@example.com"
      - key: FIRST_SUPERUSER_PASSWORD
        value: "adminadmin"
      - key: FIRST_SUPERUSER_FULL_NAME
        value: "System Admin"
